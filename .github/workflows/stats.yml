name: Daily Stats Update

on:
  schedule:
    # 每天 UTC 16:00 执行（北京时间 0:00）
    - cron: '0 16 * * *'
  workflow_dispatch: # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate comprehensive stats
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const registryContent = fs.readFileSync('registry.json', 'utf-8');
            const registry = JSON.parse(registryContent);

            if (registry.length === 0) { console.log('没有注册的仓库'); return; }

            // 读取旧统计用于增量对比
            let oldStats = { repos: {} };
            try { oldStats = JSON.parse(fs.readFileSync('stats.json', 'utf-8')); } catch(e){}

            const stats = {
              lastUpdated: new Date().toISOString(),
              repos: {},
              leaderboard: { topReposByStars: [], topReposByActivity: [], topAuthors: [] },
              summary: { totalRepos: 0, totalPlugins: 0, totalTranslations: 0, totalContributors: 0, totalStars: 0, languageDistribution: {} }
            };

            async function fetchWithRetry(fetcher, retries = 3) {
              for (let i = 0; i < retries; i++) {
                try { return await fetcher(); } catch (error) {
                  if ((error.status === 403 || error.status === 429) && i < retries - 1) {
                    const waitTime = Math.pow(2, i) * 1000 + Math.random() * 1000;
                    console.log(`    ⚠️ 限流，等待 ${Math.round(waitTime)}ms...`);
                    await new Promise(r => setTimeout(r, waitTime));
                  } else throw error;
                }
              }
            }

            const allPluginIds = new Set();
            const allContributorLogins = new Set();
            const authorAgg = new Map();
            const thirtyDaysAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();

            // 处理单个仓库的函数
            async function processRepo(entry) {
              const [owner, repo] = entry.repoAddress.split('/');
              if (!owner || !repo) return;

              const existing = oldStats.repos[entry.repoAddress] || {};
              console.log(`\n📦 处理: ${entry.repoAddress}`);

              try {
                // 1. 获取基础信息 (必要)
                const { data: repoInfo } = await fetchWithRetry(() => github.rest.repos.get({ owner, repo }));
                
                // 2. 增量判断：如果 pushed_at 没变，且已有数据，则跳过部分抓取
                let skipDeepFetch = false;
                if (existing.lastPushedAt === repoInfo.pushed_at && existing.translationCount !== undefined) {
                  console.log(`    ⚡ 距离上次运行未新增推送，启用增量模式 (跳过 metadata 和贡献者抓取)`);
                  skipDeepFetch = true;
                }

                // 3. 获取 metadata.json
                let translationCount = existing.translationCount || 0;
                let uniquePluginCount = existing.pluginCount || 0;
                let languages = existing.languages || [];
                let pluginIds = existing.pluginIds || []; // 临时用于汇总计算
                let lastManifestUpdate = existing.lastManifestUpdate || '';

                if (!skipDeepFetch) {
                  async function getRepoFileContent(targetOwner, targetRepo, path) {
                    try {
                      const { data } = await fetchWithRetry(() => github.rest.repos.getContent({ owner: targetOwner, repo: targetRepo, path }));
                      if (data.content) return JSON.parse(Buffer.from(data.content, 'base64').toString('utf-8'));
                      else if (data.sha) {
                        const { data: blob } = await fetchWithRetry(() => github.rest.git.getBlob({ owner: targetOwner, repo: targetRepo, file_sha: data.sha }));
                        return JSON.parse(Buffer.from(blob.content, 'base64').toString('utf-8'));
                      }
                    } catch (e) { if (e.status !== 404) throw e; }
                    return null;
                  }

                  try {
                    const manifest = await getRepoFileContent(owner, repo, 'metadata.json');
                    if (manifest && Array.isArray(manifest)) {
                      translationCount = manifest.length;
                      languages = [...new Set(manifest.map(e => e.language).filter(Boolean))];
                      pluginIds = [...new Set(manifest.map(e => e.plugin).filter(Boolean))];
                      uniquePluginCount = pluginIds.length;
                      const dates = manifest.map(e => e.updated_at).filter(Boolean).sort().reverse();
                      lastManifestUpdate = dates[0] || '';
                    }
                  } catch (e) { console.log(`    ⚠️ metadata.json 解析失败: ${e.message}`); }
                }

                // 4. 获取 Commits (30天内)
                let recentCommits30d = 0;
                // 如果 pushed_at 早于 30 天前，直接判定为 0
                if (new Date(repoInfo.pushed_at) < new Date(thirtyDaysAgo)) {
                  recentCommits30d = 0;
                  console.log(`    ⏭️ 超过 30 天未更新，跳过 Commit 抓取`);
                } else {
                  try {
                    const { data: commits } = await fetchWithRetry(() => github.rest.repos.listCommits({ owner, repo, since: thirtyDaysAgo, per_page: 100 }));
                    recentCommits30d = commits.length;
                  } catch (e) { console.log(`    ⚠️ Commits 失败: ${e.message}`); }
                }

                // 5. 获取贡献者
                let totalContributors = existing.totalContributors || 0;
                if (!skipDeepFetch) {
                  try {
                    const { data: contributors } = await fetchWithRetry(() => github.rest.repos.listContributors({ owner, repo, per_page: 100 }));
                    totalContributors = contributors.length;
                    contributors.forEach(c => { if(c.login) allContributorLogins.add(c.login); });
                  } catch (e) { console.log(`    ⚠️ 贡献者失败: ${e.message}`); }
                }

                const activityScore = calculateActivityScore({
                  pluginCount: uniquePluginCount,
                  lastPushedAt: repoInfo.pushed_at,
                  recentCommits30d,
                  stars: repoInfo.stargazers_count,
                  forks: repoInfo.forks_count,
                  isArchived: repoInfo.archived
                });

                const repoStats = {
                  authorName: repoInfo.owner.login,
                  authorId: repoInfo.owner.id,
                  avatarUrl: repoInfo.owner.avatar_url,
                  authorType: repoInfo.owner.type,
                  authorHtmlUrl: repoInfo.owner.html_url,
                  repoName: repoInfo.name,
                  repoFullName: repoInfo.full_name,
                  description: repoInfo.description || '',
                  htmlUrl: repoInfo.html_url,
                  defaultBranch: repoInfo.default_branch,
                  license: repoInfo.license?.spdx_id || null,
                  topics: repoInfo.topics || [],
                  isArchived: repoInfo.archived,
                  isFork: repoInfo.fork,
                  repoSize: repoInfo.size,
                  stars: repoInfo.stargazers_count,
                  forks: repoInfo.forks_count,
                  watchers: repoInfo.watchers_count,
                  openIssuesCount: repoInfo.open_issues_count,
                  repoCreatedAt: repoInfo.created_at,
                  repoUpdatedAt: repoInfo.updated_at,
                  lastPushedAt: repoInfo.pushed_at,
                  recentCommits30d,
                  totalContributors,
                  activityScore,
                  pluginCount: uniquePluginCount,
                  translationCount,
                  languages,
                  lastManifestUpdate
                };

                return { address: entry.repoAddress, stats: repoStats, pluginIds };
              } catch (e) {
                console.log(`  ❌ ${entry.repoAddress} 整体抓取失败: ${e.message}`);
                return null;
              }
            }

            // --- 控制并发的任务池执行器 ---
            const concurrency = 5;
            const results = [];
            for (let i = 0; i < registry.length; i += concurrency) {
              const chunk = registry.slice(i, i + concurrency);
              const chunkResults = await Promise.all(chunk.map(entry => processRepo(entry)));
              results.push(...chunkResults.filter(Boolean));
            }

            // --- 处理结果并汇总 ---
            for (const item of results) {
              const { address, stats: repoStats, pluginIds } = item;
              stats.repos[address] = repoStats;

              stats.summary.totalStars += repoStats.stars;
              stats.summary.totalTranslations += repoStats.translationCount;
              (pluginIds||[]).forEach(pid => allPluginIds.add(pid));
              repoStats.languages.forEach(l => {
                stats.summary.languageDistribution[l] = (stats.summary.languageDistribution[l] || 0) + repoStats.translationCount;
              });

              const authorName = repoStats.authorName;
              if (!authorAgg.has(authorName)) {
                authorAgg.set(authorName, { name: authorName, avatarUrl: repoStats.avatarUrl, htmlUrl: repoStats.authorHtmlUrl, totalPlugins: 0, totalStars: 0, repoCount: 0, languages: new Set(), activityScores: [], lastActiveAt: '' });
              }
              const agg = authorAgg.get(authorName);
              agg.totalPlugins += repoStats.pluginCount;
              agg.totalStars += repoStats.stars;
              agg.repoCount += 1;
              repoStats.languages.forEach(l => agg.languages.add(l));
              agg.activityScores.push(repoStats.activityScore);
              if (!agg.lastActiveAt || repoStats.lastPushedAt > agg.lastActiveAt) agg.lastActiveAt = repoStats.lastPushedAt;
            }

            // 排行榜计算 (保持原样)
            const repoEntries = Object.entries(stats.repos);
            stats.leaderboard.topReposByStars = repoEntries.sort((a,b) => b[1].stars - a[1].stars).slice(0,10).map(([a]) => a);
            stats.leaderboard.topReposByActivity = repoEntries.sort((a,b) => b[1].activityScore - a[1].activityScore).slice(0,10).map(([a]) => a);
            stats.leaderboard.topAuthors = Array.from(authorAgg.values())
              .map(a => ({
                name: a.name, avatarUrl: a.avatarUrl, htmlUrl: a.htmlUrl, totalPlugins: a.totalPlugins, totalStars: a.totalStars, repoCount: a.repoCount, languages: [...a.languages],
                activityScore: a.activityScores.length > 0 ? a.activityScores.sort((x,y)=>y-x).reduce((s,v,i) => s+v*(1/(i+1)),0) / a.activityScores.reduce((s,_,i)=>s+1/(i+1),0) : 0,
                lastActiveAt: a.lastActiveAt
              }))
              .sort((a,b) => b.activityScore - a.activityScore || b.totalPlugins - a.totalPlugins).slice(0,10);

            stats.summary.totalRepos = repoEntries.length;
            stats.summary.totalPlugins = allPluginIds.size;
            stats.summary.totalContributors = allContributorLogins.size;

            fs.writeFileSync('stats.json', JSON.stringify(stats, null, 2));
            console.log(`\n✅ 共更新 ${stats.summary.totalRepos} 个仓库的统计数据`);

            function calculateActivityScore({ pluginCount, lastPushedAt, recentCommits30d, stars, forks, isArchived }) {
              if (isArchived) return 0;
              const daysSincePush = lastPushedAt ? (Date.now() - new Date(lastPushedAt).getTime()) / (1000 * 60 * 60 * 24) : Infinity;
              const scoreFromCommits = Math.min(recentCommits30d * 0.5, 35);
              const scoreFromPlugins = Math.min(pluginCount * 2.0, 25);
              const scoreFromStars = Math.min(stars * 0.1, 15);
              let scoreFromTime = 0;
              if (daysSincePush <= 7) scoreFromTime = 25;
              else if (daysSincePush <= 30) scoreFromTime = 15;
              else if (daysSincePush <= 90) scoreFromTime = 5;
              return Math.min((scoreFromCommits + scoreFromPlugins + scoreFromStars + scoreFromTime) / 100, 1);
            }

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add stats.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "📊 Daily stats update $(date -u +%Y-%m-%d)"
          for i in {1..5}; do
            echo "Attempt $i to push changes..."
            if git pull --rebase && git push; then
              echo "Push successful"
              exit 0
            fi
            wait_time=$((i * 2 + RANDOM % 3))
            echo "Push failed, retrying in ${wait_time}s..."
            sleep $wait_time
          done
          echo "Push failed after 5 attempts"
          exit 1
