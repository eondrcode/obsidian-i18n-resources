name: Sync Afdian Sponsors Daily

on:
  schedule:
    - cron: '0 0 * * *' # Run at midnight UTC daily
  workflow_dispatch: # Enable manual triggering
  
jobs:
  sync_sponsors:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync Afdian Data
        env:
          AFDIAN_TOKEN: ${{ secrets.AFDIAN_TOKEN }}
          AFDIAN_USER_ID: ${{ secrets.AFDIAN_USER_ID }}
        run: node scripts/sync_afdian.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add contributors.json
          git commit -m "Auto-sync Afdian sponsors [skip ci]" || exit 0
          git push
