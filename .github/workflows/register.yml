name: Approve and Register Translation Repo

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write

jobs:
  label_new:
    if: github.event.action == 'opened' && startsWith(github.event.issue.title, '[Register]')
    runs-on: ubuntu-latest
    steps:
      - name: Auto Label New Request
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['申请收录']
            });

  approve:
    if: github.event.action == 'labeled' && github.event.label.name == '同意收录'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Process Approval
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue.number;
            const title = context.payload.issue.title;

            // 移除所有相关的过程标签和其他状态，只保留【已收录】
            for (const label of ['申请收录', '同意收录', '拒绝收录', '取消收录', '已拒绝', '已取消']) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: label }); } catch(e){}
            }

            const match = title.match(/\[Register\]\s*(.+)/);
            if (!match) return;
            const repoAddress = match[1].trim();
            const parts = repoAddress.split('/');
            if (parts.length !== 2) return;
            const [targetOwner, targetRepo] = parts;

            // 读取 registry
            let registry = [];
            try { registry = JSON.parse(fs.readFileSync('registry.json', 'utf-8')); } catch (e) {}

            registry = registry.filter(r => r.repoAddress !== repoAddress);
            registry.push({ repoAddress: repoAddress, registeredAt: new Date().toISOString() });

            // 获取数据
            let repoInfo;
            try {
              repoInfo = (await github.rest.repos.get({ owner: targetOwner, repo: targetRepo })).data;
            } catch {
              await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body: `❌ 仓库 \`${repoAddress}\` 不存在或不可访问。` });
              return;
            }

            async function getRepoFileContent(targetOwner, targetRepo, path) {
              try {
                const { data } = await github.rest.repos.getContent({ owner: targetOwner, repo: targetRepo, path });
                if (data.content) {
                  return JSON.parse(Buffer.from(data.content, 'base64').toString('utf-8'));
                } else if (data.sha) {
                  console.log(`📄 文件 ${path} 超过 1MB，尝试通过 Blob 获取内容 (SHA: ${data.sha})...`);
                  const { data: blob } = await github.rest.git.getBlob({ owner: targetOwner, repo: targetRepo, file_sha: data.sha });
                  return JSON.parse(Buffer.from(blob.content, 'base64').toString('utf-8'));
                }
              } catch (e) {
                if (e.status !== 404) throw e;
              }
              return null;
            }

            let manifestData = null;
            try {
              manifestData = await getRepoFileContent(targetOwner, targetRepo, 'metadata.json');
              if (!Array.isArray(manifestData)) throw new Error('Not array');
            } catch (e) {
              await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body: `❌ 仓库 \`${repoAddress}\` 中未找到有效的 \`metadata.json\`，或者文件格式错误。` });
              return;
            }

            fs.writeFileSync('registry.json', JSON.stringify(registry, null, 2));

            // ---- 采集完整数据 ----
            let stats = { lastUpdated: '', repos: {}, leaderboard: { topReposByStars: [], topReposByActivity: [], topAuthors: [] }, summary: { totalRepos: 0, totalPlugins: 0, totalTranslations: 0, totalContributors: 0, totalStars: 0, languageDistribution: {} } };
            try { stats = JSON.parse(fs.readFileSync('stats.json', 'utf-8')); } catch (e) {}
            // 确保新结构字段存在
            if (!stats.leaderboard) stats.leaderboard = { topReposByStars: [], topReposByActivity: [], topAuthors: [] };
            if (!stats.summary) stats.summary = { totalRepos: 0, totalPlugins: 0, totalTranslations: 0, totalContributors: 0, totalStars: 0, languageDistribution: {} };

            const languages = [...new Set(manifestData.map(e => e.language).filter(Boolean))];
            const pluginIds = [...new Set(manifestData.map(e => e.plugin).filter(Boolean))];
            const translationCount = manifestData.length;
            const uniquePluginCount = pluginIds.length;
            const dates = manifestData.map(e => e.updated_at).filter(Boolean).sort().reverse();
            const lastManifestUpdate = dates[0] || '';

            // 近 30 天 commits
            let recentCommits30d = 0;
            try {
              const thirtyDaysAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
              const { data: commits } = await github.rest.repos.listCommits({ owner: targetOwner, repo: targetRepo, since: thirtyDaysAgo, per_page: 100 });
              recentCommits30d = commits.length;
            } catch (e) { console.log('⚠️ commits:', e.message); }

            // 贡献者
            let totalContributors = 0;
            try {
              const { data: contributors } = await github.rest.repos.listContributors({ owner: targetOwner, repo: targetRepo, per_page: 100 });
              totalContributors = contributors.length;
            } catch (e) { console.log('⚠️ contributors:', e.message); }

            // 活跃度评分算法 (同步自 stats.yml)
            function calculateActivityScore({ pluginCount, lastPushedAt, recentCommits30d, stars, forks, isArchived }) {
              if (isArchived) return 0;
              let daysSincePush = Infinity;
              if (lastPushedAt) {
                daysSincePush = (Date.now() - new Date(lastPushedAt).getTime()) / (1000 * 60 * 60 * 24);
              }
              const scoreFromCommits = Math.min(recentCommits30d * 0.5, 35);
              const scoreFromPlugins = Math.min(pluginCount * 2.0, 25);
              const scoreFromStars = Math.min(stars * 0.1, 15);
              let scoreFromTime = 0;
              if (daysSincePush <= 7) scoreFromTime = 25;
              else if (daysSincePush <= 30) scoreFromTime = 15;
              else if (daysSincePush <= 90) scoreFromTime = 5;

              const totalScore = (scoreFromCommits + scoreFromPlugins + scoreFromStars + scoreFromTime) / 100;
              return Math.min(totalScore, 1);
            }

            const activityScore = calculateActivityScore({
              pluginCount: uniquePluginCount,
              lastPushedAt: repoInfo.pushed_at,
              recentCommits30d,
              stars: repoInfo.stargazers_count,
              forks: repoInfo.forks_count,
              isArchived: repoInfo.archived
            });

            stats.repos[repoAddress] = {
              authorName: repoInfo.owner.login,
              authorId: repoInfo.owner.id,
              avatarUrl: repoInfo.owner.avatar_url,
              authorType: repoInfo.owner.type,
              authorHtmlUrl: repoInfo.owner.html_url,
              repoName: repoInfo.name,
              repoFullName: repoInfo.full_name,
              description: repoInfo.description || '',
              htmlUrl: repoInfo.html_url,
              defaultBranch: repoInfo.default_branch,
              license: repoInfo.license?.spdx_id || null,
              topics: repoInfo.topics || [],
              isArchived: repoInfo.archived,
              isFork: repoInfo.fork,
              repoSize: repoInfo.size,
              stars: repoInfo.stargazers_count,
              forks: repoInfo.forks_count,
              watchers: repoInfo.watchers_count,
              openIssuesCount: repoInfo.open_issues_count,
              repoCreatedAt: repoInfo.created_at,
              repoUpdatedAt: repoInfo.updated_at,
              lastPushedAt: repoInfo.pushed_at,
              recentCommits30d,
              totalContributors,
              activityScore,
              pluginCount: uniquePluginCount,
              translationCount,
              languages,
            lastManifestUpdate
            };

            // 重新计算排行榜和汇总 (同步自 stats.yml)
            const entries = Object.entries(stats.repos);
            stats.leaderboard.topReposByStars = entries.sort((a,b) => b[1].stars - a[1].stars).slice(0,10).map(([a]) => a);
            stats.leaderboard.topReposByActivity = entries.sort((a,b) => (b[1].activityScore||0) - (a[1].activityScore||0)).slice(0,10).map(([a]) => a);

            const am = new Map();
            for (const [, s] of entries) {
              const n = s.authorName || 'Unknown';
              const ex = am.get(n);
              if (ex) {
                ex.totalPlugins += s.pluginCount||0;
                ex.totalStars += s.stars||0;
                ex.repoCount++;
                (s.languages||[]).forEach(l => ex.langs.add(l));
                ex.scores.push(s.activityScore||0);
                if(s.lastPushedAt > ex.lastActiveAt) ex.lastActiveAt = s.lastPushedAt;
              } else {
                am.set(n, {
                  name: n,
                  avatarUrl: s.avatarUrl||'',
                  htmlUrl: s.authorHtmlUrl||'',
                  totalPlugins: s.pluginCount||0,
                  totalStars: s.stars||0,
                  repoCount: 1,
                  langs: new Set(s.languages||[]),
                  scores: [s.activityScore||0],
                  lastActiveAt: s.lastPushedAt||''
                });
              }
            }
            stats.leaderboard.topAuthors = Array.from(am.values())
              .map(a => ({
                name: a.name,
                avatarUrl: a.avatarUrl,
                htmlUrl: a.htmlUrl,
                totalPlugins: a.totalPlugins,
                totalStars: a.totalStars,
                repoCount: a.repoCount,
                languages: [...a.langs],
                activityScore: a.scores.length > 0
                  ? a.scores.sort((x, y) => y - x).reduce((s, v, i) => s + v / (i + 1), 0) / a.scores.reduce((s, _, i) => s + 1 / (i + 1), 0)
                  : 0,
                lastActiveAt: a.lastActiveAt
              }))
              .sort((a, b) => b.activityScore - a.activityScore || b.totalPlugins - a.totalPlugins)
              .slice(0, 10);

            let totalTrans = 0;
            const langDist = {};
            for (const [, s] of entries) {
              totalTrans += s.translationCount||0;
              (s.languages||[]).forEach(l => {
                langDist[l] = (langDist[l]||0) + (s.translationCount||0);
              });
            }

            // 插件总数(去重)由于不再存储列表，注册流程中无法准确重新计算。
            // 我们保留原有的总数。真正的准确计算由每日例行的 stats.yml 完成。
            const totalPluginsCount = stats.summary.totalPlugins || 0;

            stats.summary = {
              totalRepos: entries.length,
              totalPlugins: totalPluginsCount,
              totalTranslations: totalTrans,
              totalContributors: new Set(entries.map(([,s])=>s.authorName).filter(Boolean)).size,
              totalStars: entries.reduce((s,[,r])=>s+(r.stars||0),0),
              languageDistribution: langDist
             };

            stats.lastUpdated = new Date().toISOString();
            fs.writeFileSync('stats.json', JSON.stringify(stats, null, 2));

            await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['已收录'] });
            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber,
              body: `✅ **同意收录！** 仓库 \`${repoAddress}\` 已成功加入社区目录。\n\n📊 **统计数据**：\n- ⭐ Stars: ${repoInfo.stargazers_count}\n- 📦 翻译包: ${manifestData.length}\n- 🌍 语言: ${languages.join(', ')}\n- 🔥 活跃度: ${activityScore}\n- 👥 贡献者: ${totalContributors}`
            });
            await github.rest.issues.update({ owner, repo, issue_number: issueNumber, state: 'closed' });

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add registry.json stats.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Approve repo from issue #${{ github.event.issue.number }}"
          for i in {1..5}; do
            echo "Attempt $i to push changes..."
            if git pull --rebase && git push; then
              echo "Push successful"
              exit 0
            fi
            wait_time=$((i * 2 + RANDOM % 3))
            echo "Push failed, retrying in ${wait_time}s..."
            sleep $wait_time
          done
          echo "Push failed after 5 attempts"
          exit 1

  reject:
    if: github.event.action == 'labeled' && github.event.label.name == '拒绝收录'
    runs-on: ubuntu-latest
    steps:
      - name: Process Rejection
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue.number;

            // 移除所有相关的过程标签和其他状态，只保留【已拒绝】
            for (const label of ['申请收录', '同意收录', '拒绝收录', '取消收录', '已收录', '已取消']) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: label }); } catch(e){}
            }

            await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['已拒绝'] });
            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber,
              body: '❌ **拒绝收录**。您的翻译仓库未能通过审核。'
            });
            await github.rest.issues.update({ owner, repo, issue_number: issueNumber, state: 'closed' });

  remove:
    if: github.event.action == 'labeled' && github.event.label.name == '取消收录'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Process Removal
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue.number;
            const title = context.payload.issue.title;

            // 移除所有相关的过程标签和其他状态，只保留【已取消】
            for (const label of ['申请收录', '同意收录', '拒绝收录', '取消收录', '已收录', '已拒绝']) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: label }); } catch(e){}
            }

            const match = title.match(/\[Register\]\s*(.+)/);
            if (!match) return;
            const repoAddress = match[1].trim();

            let registry = [];
            try { registry = JSON.parse(fs.readFileSync('registry.json', 'utf-8')); } catch (e) {}
            registry = registry.filter(r => r.repoAddress !== repoAddress);
            fs.writeFileSync('registry.json', JSON.stringify(registry, null, 2));

            let stats = { lastUpdated: '', repos: {}, leaderboard: { topReposByStars: [], topReposByActivity: [], topAuthors: [] }, summary: { totalRepos: 0, totalPlugins: 0, totalTranslations: 0, totalContributors: 0, totalStars: 0, languageDistribution: {} } };
            try { stats = JSON.parse(fs.readFileSync('stats.json', 'utf-8')); } catch (e) {}
            if (!stats.leaderboard) stats.leaderboard = { topReposByStars: [], topReposByActivity: [], topAuthors: [] };
            if (!stats.summary) stats.summary = { totalRepos: 0, totalPlugins: 0, totalTranslations: 0, totalContributors: 0, totalStars: 0, languageDistribution: {} };

            if (stats.repos[repoAddress]) delete stats.repos[repoAddress];

            // 重新计算排行榜和汇总 (同步自 stats.yml)
            const entries = Object.entries(stats.repos);
            stats.leaderboard.topReposByStars = entries.sort((a,b) => b[1].stars - a[1].stars).slice(0,10).map(([a]) => a);
            stats.leaderboard.topReposByActivity = entries.sort((a,b) => (b[1].activityScore||0) - (a[1].activityScore||0)).slice(0,10).map(([a]) => a);

            const am = new Map();
            for (const [, s] of entries) {
              const n = s.authorName || 'Unknown';
              const ex = am.get(n);
              if (ex) {
                ex.totalPlugins += s.pluginCount||0;
                ex.totalStars += s.stars||0;
                ex.repoCount++;
                (s.languages||[]).forEach(l => ex.langs.add(l));
                ex.scores.push(s.activityScore||0);
                if(s.lastPushedAt > ex.lastActiveAt) ex.lastActiveAt = s.lastPushedAt;
              } else {
                am.set(n, {
                  name: n,
                  avatarUrl: s.avatarUrl||'',
                  htmlUrl: s.authorHtmlUrl||'',
                  totalPlugins: s.pluginCount||0,
                  totalStars: s.stars||0,
                  repoCount: 1,
                  langs: new Set(s.languages||[]),
                  scores: [s.activityScore||0],
                  lastActiveAt: s.lastPushedAt||''
                });
              }
            }
            stats.leaderboard.topAuthors = Array.from(am.values())
              .map(a => ({
                name: a.name,
                avatarUrl: a.avatarUrl,
                htmlUrl: a.htmlUrl,
                totalPlugins: a.totalPlugins,
                totalStars: a.totalStars,
                repoCount: a.repoCount,
                languages: [...a.langs],
                activityScore: a.scores.length > 0
                  ? a.scores.sort((x, y) => y - x).reduce((s, v, i) => s + v / (i + 1), 0) / a.scores.reduce((s, _, i) => s + 1 / (i + 1), 0)
                  : 0,
                lastActiveAt: a.lastActiveAt
              }))
              .sort((a, b) => b.activityScore - a.activityScore || b.totalPlugins - a.totalPlugins)
              .slice(0, 10);

            // 重新计算排行榜和汇总 (同步自 stats.yml)
            const entries = Object.entries(stats.repos);
            stats.leaderboard.topReposByStars = entries.sort((a,b) => b[1].stars - a[1].stars).slice(0,10).map(([a]) => a);
            stats.leaderboard.topReposByActivity = entries.sort((a,b) => (b[1].activityScore||0) - (a[1].activityScore||0)).slice(0,10).map(([a]) => a);

            const am = new Map();
            for (const [, s] of entries) {
              const n = s.authorName || 'Unknown';
              const ex = am.get(n);
              if (ex) {
                ex.totalPlugins += s.pluginCount||0;
                ex.totalStars += s.stars||0;
                ex.repoCount++;
                (s.languages||[]).forEach(l => ex.langs.add(l));
                ex.scores.push(s.activityScore||0);
                if(s.lastPushedAt > ex.lastActiveAt) ex.lastActiveAt = s.lastPushedAt;
              } else {
                am.set(n, {
                  name: n,
                  avatarUrl: s.avatarUrl||'',
                  htmlUrl: s.authorHtmlUrl||'',
                  totalPlugins: s.pluginCount||0,
                  totalStars: s.stars||0,
                  repoCount: 1,
                  langs: new Set(s.languages||[]),
                  scores: [s.activityScore||0],
                  lastActiveAt: s.lastPushedAt||''
                });
              }
            }
            stats.leaderboard.topAuthors = Array.from(am.values())
              .map(a => ({
                name: a.name,
                avatarUrl: a.avatarUrl,
                htmlUrl: a.htmlUrl,
                totalPlugins: a.totalPlugins,
                totalStars: a.totalStars,
                repoCount: a.repoCount,
                languages: [...a.langs],
                activityScore: a.scores.length > 0
                  ? a.scores.sort((x, y) => y - x).reduce((s, v, i) => s + v / (i + 1), 0) / a.scores.reduce((s, _, i) => s + 1 / (i + 1), 0)
                  : 0,
                lastActiveAt: a.lastActiveAt
              }))
              .sort((a, b) => b.activityScore - a.activityScore || b.totalPlugins - a.totalPlugins)
              .slice(0, 10);

            let totalTrans = 0;
            const langDist = {};
            for (const [, s] of entries) {
              totalTrans += s.translationCount||0;
              (s.languages||[]).forEach(l => {
                langDist[l] = (langDist[l]||0) + (s.translationCount||0);
              });
            }
            
            // 插件总数(去重)由于不再存储列表，注册/移除流程中无法准确重新计算。
            // 真正的准确计算由每日例行的 stats.yml 完成。
            const totalPluginsCount = stats.summary.totalPlugins || 0;

            stats.summary = {
              totalRepos: entries.length,
              totalPlugins: totalPluginsCount,
              totalTranslations: totalTrans,
              totalContributors: new Set(entries.map(([,s])=>s.authorName).filter(Boolean)).size,
              totalStars: entries.reduce((s,[,r])=>s+(r.stars||0),0),
              languageDistribution: langDist
             };

            stats.lastUpdated = new Date().toISOString();
            fs.writeFileSync('stats.json', JSON.stringify(stats, null, 2));

            await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['已取消'] });
            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber,
              body: `⏸️ **已取消收录**。仓库 \`${repoAddress}\` 已从社区目录中移除，排行榜和统计已更新。`
            });
            await github.rest.issues.update({ owner, repo, issue_number: issueNumber, state: 'closed' });

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add registry.json stats.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Remove repo from issue #${{ github.event.issue.number }}"
          for i in {1..5}; do
            echo "Attempt $i to push changes..."
            if git pull --rebase && git push; then
              echo "Push successful"
              exit 0
            fi
            wait_time=$((i * 2 + RANDOM % 3))
            echo "Push failed, retrying in ${wait_time}s..."
            sleep $wait_time
          done
          echo "Push failed after 5 attempts"
          exit 1

